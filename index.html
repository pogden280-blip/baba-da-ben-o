<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Gostosinho</title>
    <!-- Tailwind CSS 3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .star-rating button { transition: transform 0.1s; }
        .star-rating button:active { transform: scale(0.9); }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f4f4f5;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #a1a1aa;
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const motion = (window.Motion && window.Motion.motion) || (window.framerMotion && window.framerMotion.motion) || { div: 'div' };

        // Verificação de dependências
        if (!window.lucide || !window.React || !window.ReactDOM) {
            console.error("Erro: Algumas dependências (Lucide, React ou ReactDOM) não foram carregadas corretamente.");
        }

        // Configurações do JSONbin
        const BIN_ID = '69af06d2ae596e708f71a0ef';
        const MASTER_KEY = '$2a$10$RxtN.VwYLRsGcmoCji08oeL2di9W0D4tyrBZe/vIV77N665ALQ9Vi';
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // Componente de Ícone Lucide (Wrapper para CDN)
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                if (containerRef.current) {
                    // Clear container and create a fresh i element for Lucide to replace
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    
                    if (window.lucide) {
                        window.lucide.createIcons({
                            attrs: {
                                size,
                                class: className,
                                fill
                            },
                            nameAttr: 'data-lucide'
                        });
                    }
                }
            }, [name, size, className, fill]);

            return <span ref={containerRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        function App() {
            const [players, setPlayers] = useState([]);
            const [finances, setFinances] = useState([]);
            const [currentUser, setCurrentUser] = useState(localStorage.getItem('futamigos_current_user'));
            const [currentTab, setCurrentTab] = useState('home');
            const [adminSubTab, setAdminSubTab] = useState('finance');
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [isViewMode, setIsViewMode] = useState(false);
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            
            const [showAddPlayerForm, setShowAddPlayerForm] = useState(false);
            const [showAddGuestForm, setShowAddGuestForm] = useState(false);
            const [guests, setGuests] = useState([]);
            const [confirmedPlayerIds, setConfirmedPlayerIds] = useState([]);
            const [absentCommissionIds, setAbsentCommissionIds] = useState([]);
            const [newGuestName, setNewGuestName] = useState('');
            const [newGuestRating, setNewGuestRating] = useState(3);
            const [isGuestGoalkeeper, setIsGuestGoalkeeper] = useState(false);
            const [isGuestPaid, setIsGuestPaid] = useState(true);
            
            // Form States
            const [newPlayerName, setNewPlayerName] = useState('');
            const [newPlayerRating, setNewPlayerRating] = useState(3);
            const [newPlayerType, setNewPlayerType] = useState('diarista');
            const [newPlayerPaymentStatus, setNewPlayerPaymentStatus] = useState('pago');
            const [newPlayerDueDate, setNewPlayerDueDate] = useState('');
            const [isGoalkeeper, setIsGoalkeeper] = useState(false);
            const [isPunished, setIsPunished] = useState(false);
            const [newPlayerPunishmentCount, setNewPlayerPunishmentCount] = useState(1);
            const [newPlayerPunishmentFine, setNewPlayerPunishmentFine] = useState(0);
            const [financeDesc, setFinanceDesc] = useState('');
            const [financeAmount, setFinanceAmount] = useState('');
            const [financeType, setFinanceType] = useState('income');
            const [mensalidadeValue, setMensalidadeValue] = useState(26);
            const [diariaValue, setDiariaValue] = useState(8);
            const [isSavingSettings, setIsSavingSettings] = useState(false);
            const [filterStartDate, setFilterStartDate] = useState('');
            const [filterEndDate, setFilterEndDate] = useState('');
            
            // Role states
            const [showRoleModal, setShowRoleModal] = useState(false);
            const [selectedPlayerForRole, setSelectedPlayerForRole] = useState(null);
            const [newRolePassword, setNewRolePassword] = useState('');
            const [roleActionStep, setRoleActionStep] = useState('choice'); // 'choice', 'password', 'config'
            const [adminPasswordInput, setAdminPasswordInput] = useState('');
            const longPressTimer = useRef(null);

            const [accessHistory, setAccessHistory] = useState([]);
            const [showEditPlayerModal, setShowEditPlayerModal] = useState(false);
            const [editingPlayer, setEditingPlayer] = useState(null);
            
            // Match States
            const [teams, setTeams] = useState([]); // Array of { name: 'Time 1', players: [], score: 0 }
            const [currentMatchTeams, setCurrentMatchTeams] = useState([0, 1]); // Indices of teams in match
            const [teamQueue, setTeamQueue] = useState([]); // Queue of team indices
            const [playersInDrawIds, setPlayersInDrawIds] = useState([]); // IDs of players who were in the draw
            const [currentLoans, setCurrentLoans] = useState([]); // Array of { fromTeamIdx, toTeamIdx, player }
            const [loanedPlayersIdsByTeam, setLoanedPlayersIdsByTeam] = useState({}); // { teamIdx: [playerIds] }
            const [matchHistory, setMatchHistory] = useState([]); // Array of { t1: name, s1: score, t2: name, s2: score, time: string }
            const [showDaySummary, setShowDaySummary] = useState(false);
            const [timerSeconds, setTimerSeconds] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [drawNumTeams, setDrawNumTeams] = useState(2);
            const [drawPlayersPerTeam, setDrawPlayersPerTeam] = useState(6);
            const [drawIncludeGoalkeepers, setDrawIncludeGoalkeepers] = useState(true);
            const [drawMode, setDrawMode] = useState('teams');
            const timerRef = useRef(null);

            // Carregar dados do JSONbin
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(API_URL, {
                            headers: { 'X-Master-Key': MASTER_KEY }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            const rawPlayers = data.record.players || [];
                            const rawFinances = data.record.finances || [];
                            const rawHistory = data.record.matchHistory || [];
                            const rawGuests = data.record.guests || [];
                            const rawConfirmed = data.record.confirmedPlayerIds || [];
                            const rawAbsent = data.record.absentCommissionIds || [];
                            const rawAccessHistory = data.record.accessHistory || [];
                            const rawMensalidade = data.record.mensalidadeValue || 26;
                            const rawDiaria = data.record.diariaValue || 8;
                            
                            // Check for expirations
                            const today = new Date();
                            today.setHours(0, 0, 0, 0);
                            let expirationsChanged = false;
                            const processedPlayers = rawPlayers.map(p => {
                                if (p.type === 'mensalista' && p.paymentStatus === 'pago' && p.dueDate) {
                                    const [year, month, day] = p.dueDate.split('-').map(Number);
                                    const dueDate = new Date(year, month - 1, day);
                                    if (dueDate < today) {
                                        expirationsChanged = true;
                                        return { ...p, paymentStatus: 'não', punishmentCount: p.punishmentCount || 0 };
                                    }
                                }
                                return { ...p, punishmentCount: p.punishmentCount || 0 };
                            });

                            setPlayers(processedPlayers);
                            setFinances(rawFinances);
                            setMatchHistory(rawHistory);
                            setGuests(rawGuests);
                            setAbsentCommissionIds(rawAbsent);
                            setAccessHistory(rawAccessHistory);
                            setMensalidadeValue(rawMensalidade);
                            setDiariaValue(rawDiaria);
                            
                            // Always filter confirmed list to only include paid players
                            let finalConfirmed = rawConfirmed.filter(id => {
                                const player = processedPlayers.find(p => p.id === id);
                                return player && player.paymentStatus === 'pago';
                            });

                            if (finalConfirmed.length === 0 && processedPlayers.length > 0 && !data.record.lastDraw) {
                                const defaultConfirmed = processedPlayers.filter(p => ((p.type === 'mensalista' && p.paymentStatus === 'pago') || p.role === 'commission') && !p.isPunished).map(p => p.id);
                                setConfirmedPlayerIds(defaultConfirmed);
                            } else {
                                setConfirmedPlayerIds(finalConfirmed);
                            }

                            setShowDaySummary(data.record.showDaySummary || false);

                            if (expirationsChanged) {
                                saveData(processedPlayers, rawFinances, data.record.lastDraw, rawHistory, data.record.showDaySummary, rawGuests, finalConfirmed, rawMensalidade, rawDiaria, rawAbsent);
                            }
                            if (data.record.lastDraw) {
                                if (data.record.lastDraw.teams) {
                                    setTeams(data.record.lastDraw.teams);
                                    if (data.record.lastDraw.currentMatchTeams) {
                                        setCurrentMatchTeams(data.record.lastDraw.currentMatchTeams);
                                    }
                                    if (data.record.lastDraw.teamQueue) {
                                        setTeamQueue(data.record.lastDraw.teamQueue);
                                    }
                                    if (data.record.lastDraw.playersInDrawIds) {
                                        setPlayersInDrawIds(data.record.lastDraw.playersInDrawIds);
                                    }
                                    if (data.record.lastDraw.currentLoans) {
                                        setCurrentLoans(data.record.lastDraw.currentLoans);
                                    }
                                    if (data.record.lastDraw.loanedPlayersIdsByTeam) {
                                        setLoanedPlayersIdsByTeam(data.record.lastDraw.loanedPlayersIdsByTeam);
                                    }
                                } else if (data.record.lastDraw.teamA) {
                                    setTeams([
                                        { ...data.record.lastDraw.teamA, name: 'Time 1' },
                                        { ...data.record.lastDraw.teamB, name: 'Time 2' }
                                    ]);
                                }
                            }
                        }
                    } catch (error) {
                        console.error("Erro ao carregar dados:", error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);

            // Salvar dados no JSONbin
            const saveData = async (newPlayers, newFinances, lastDraw, newHistory, newShowSummary, newGuests, newConfirmedIds, newMensalidade, newDiaria, newAbsentIds, newAccessHistory, newCurrentLoans, newLoanHistory) => {
                try {
                    // Pruning logic to save space in JSONbin
                    const prunedFinances = (newFinances !== undefined ? newFinances : finances).slice(-200); // Keep last 200 financial records
                    const prunedAccessHistory = (newAccessHistory !== undefined ? newAccessHistory : accessHistory).slice(-50); // Keep last 50 access logs
                    
                    const currentDraw = lastDraw !== undefined ? lastDraw : (teams.length > 0 ? { teams, currentMatchTeams, teamQueue, playersInDrawIds, currentLoans: newCurrentLoans || currentLoans, loanedPlayersIdsByTeam: newLoanHistory || loanedPlayersIdsByTeam } : null);
                    const historyToSave = (newHistory !== undefined ? newHistory : matchHistory).slice(-50); // Keep last 50 matches (usually just one day)
                    const summaryToSave = newShowSummary !== undefined ? newShowSummary : showDaySummary;
                    const guestsToSave = newGuests !== undefined ? newGuests : guests;
                    const confirmedToSave = newConfirmedIds !== undefined ? newConfirmedIds : confirmedPlayerIds;
                    const mensalidadeToSave = newMensalidade !== undefined ? newMensalidade : mensalidadeValue;
                    const diariaToSave = newDiaria !== undefined ? newDiaria : diariaValue;
                    const absentToSave = newAbsentIds !== undefined ? newAbsentIds : absentCommissionIds;
                    
                    const response = await fetch(API_URL, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': MASTER_KEY
                        },
                        body: JSON.stringify({ 
                            players: newPlayers, 
                            finances: prunedFinances,
                            lastDraw: currentDraw,
                            matchHistory: historyToSave,
                            showDaySummary: summaryToSave,
                            guests: guestsToSave,
                            confirmedPlayerIds: confirmedToSave,
                            mensalidadeValue: mensalidadeToSave,
                            diariaValue: diariaToSave,
                            absentCommissionIds: absentToSave,
                            accessHistory: prunedAccessHistory
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || `Erro HTTP: ${response.status}`);
                    }
                } catch (error) {
                    console.error("Erro ao salvar dados:", error);
                    alert("Erro ao salvar dados: " + error.message);
                }
            };

            // Timer Logic
            useEffect(() => {
                if (isTimerRunning) {
                    timerRef.current = setInterval(() => {
                        setTimerSeconds(s => s + 1);
                    }, 1000);
                } else {
                    if (timerRef.current) clearInterval(timerRef.current);
                }
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                };
            }, [isTimerRunning]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            };

            const handleAdminAuth = () => {
                const authorizedPasswords = ["Dan2620", "Davi2168"];
                
                // Check dynamic commission members
                const commissionMember = players.find(p => p.role === 'commission' && p.password === passwordInput);
                
                if (authorizedPasswords.includes(passwordInput) || commissionMember) {
                    const user = commissionMember ? commissionMember.name : passwordInput;
                    setCurrentUser(user);
                    localStorage.setItem('futamigos_current_user', user);
                    
                    // Update access history
                    const newAccess = {
                        user: user,
                        time: new Date().toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })
                    };
                    const updatedHistory = [newAccess, ...accessHistory].slice(0, 3);
                    setAccessHistory(updatedHistory);
                    
                    setIsAdminMode(true);
                    setIsViewMode(false);
                    setShowPasswordModal(false);
                    setCurrentTab('home');
                    setPasswordInput('');
                    
                    // Save with new history
                    saveData(players, finances, undefined, undefined, undefined, undefined, undefined, undefined, undefined, undefined, updatedHistory);
                } else {
                    alert("Senha incorreta! Acesso negado.");
                }
            };

            const handleLongPressStart = (player) => {
                longPressTimer.current = setTimeout(() => {
                    setSelectedPlayerForRole(player);
                    setRoleActionStep('choice');
                    setShowRoleModal(true);
                }, 800); // 800ms for long press
            };

            const handleLongPressEnd = () => {
                if (longPressTimer.current) {
                    clearTimeout(longPressTimer.current);
                }
            };

            const isPlayerConfirmed = (player) => {
                if (!player || player.isPunished) return false;
                if (player.role === 'commission') {
                    return !absentCommissionIds.includes(player.id);
                }
                return confirmedPlayerIds.includes(player.id);
            };

            const toggleCommissionAbsence = (player) => {
                const isCurrentlyAbsent = absentCommissionIds.includes(player.id);
                const newAbsent = isCurrentlyAbsent 
                    ? absentCommissionIds.filter(id => id !== player.id)
                    : [...absentCommissionIds, player.id];
                setAbsentCommissionIds(newAbsent);
                saveData(players, finances, undefined, undefined, undefined, undefined, undefined, undefined, undefined, newAbsent);
                setShowRoleModal(false);
                setSelectedPlayerForRole(null);
            };

            const handleRoleAction = () => {
                if (isAdminMode) {
                    if (selectedPlayerForRole.role === 'commission') {
                        removeCommissionRole();
                    } else {
                        setRoleActionStep('config');
                    }
                    return;
                }

                // Check admin password
                const authorizedPasswords = ["Dan2620", "Davi2168"];
                const commissionMember = players.find(p => p.role === 'commission' && p.password === adminPasswordInput);
                
                if (authorizedPasswords.includes(adminPasswordInput) || commissionMember) {
                    if (selectedPlayerForRole.role === 'commission') {
                        removeCommissionRole();
                    } else {
                        setRoleActionStep('config');
                    }
                    setAdminPasswordInput('');
                } else {
                    alert("Senha incorreta! Acesso negado.");
                }
            };

            const assignCommissionRole = () => {
                if (!newRolePassword.trim()) {
                    alert("Por favor, defina uma senha!");
                    return;
                }

                const updatedPlayers = players.map(p => {
                    if (p.id === selectedPlayerForRole.id) {
                        return { ...p, role: 'commission', password: newRolePassword.trim() };
                    }
                    return p;
                });

                setPlayers(updatedPlayers);
                saveData(updatedPlayers, finances, undefined, matchHistory);
                setShowRoleModal(false);
                setSelectedPlayerForRole(null);
                setNewRolePassword('');
                setRoleActionStep('choice');
                setAdminPasswordInput('');
                alert(`${selectedPlayerForRole.name} agora faz parte da Comissão!`);
            };

            const removeCommissionRole = () => {
                const updatedPlayers = players.map(p => {
                    if (p.id === selectedPlayerForRole.id) {
                        const { role, password, ...rest } = p;
                        return rest;
                    }
                    return p;
                });

                setPlayers(updatedPlayers);
                saveData(updatedPlayers, finances, undefined, matchHistory);
                setShowRoleModal(false);
                setSelectedPlayerForRole(null);
                setRoleActionStep('choice');
                setAdminPasswordInput('');
                alert(`Cargo de Comissão removido de ${selectedPlayerForRole.name}.`);
            };

            const updatePlayerFull = () => {
                if (!editingPlayer || !editingPlayer.name.trim()) return;
                
                const updatedPlayers = players.map(p => {
                    if (p.id === editingPlayer.id) {
                        return { ...editingPlayer };
                    }
                    return p;
                });
                
                setPlayers(updatedPlayers);
                saveData(updatedPlayers, finances, undefined, matchHistory);
                setShowEditPlayerModal(false);
                setEditingPlayer(null);
                alert("Jogador atualizado com sucesso!");
            };

            const addPlayer = () => {
                if (!newPlayerName.trim()) return;
                const newPlayer = {
                    id: Date.now().toString(),
                    name: newPlayerName.trim(),
                    level: newPlayerRating,
                    type: newPlayerType,
                    paymentStatus: newPlayerPaymentStatus,
                    dueDate: newPlayerDueDate,
                    author: currentUser,
                    isGoalkeeper: isGoalkeeper,
                    isPunished: isPunished,
                    punishmentCount: isPunished ? newPlayerPunishmentCount : 0,
                    punishmentFine: isPunished ? newPlayerPunishmentFine : 0,
                    punishmentFinePaid: isPunished && newPlayerPunishmentFine > 0 ? false : true,
                    presences: 0,
                    totalBabas: 0
                };
                const updatedPlayers = [...players, newPlayer];
                setPlayers(updatedPlayers);
                
                let newConfirmed = [...confirmedPlayerIds];
                let newFinances = [...finances];

                if (newPlayer.paymentStatus === 'pago' && !newPlayer.isPunished) {
                    newConfirmed.push(newPlayer.id);
                    setConfirmedPlayerIds(newConfirmed);

                    // Se for mensalista pago ao adicionar, lança no financeiro
                    if (newPlayer.type === 'mensalista') {
                        newFinances.push({
                            id: `m-${Date.now()}-${newPlayer.id}`,
                            description: `Mensalidade (Novo): ${newPlayer.name}`,
                            amount: mensalidadeValue,
                            type: 'income',
                            date: new Date().toLocaleDateString('pt-BR'),
                            author: currentUser
                        });
                        setFinances(newFinances);
                    }
                }

                saveData(updatedPlayers, newFinances, undefined, matchHistory, undefined, undefined, newConfirmed);
                setNewPlayerName('');
                setNewPlayerRating(3);
                setNewPlayerType('diarista');
                setNewPlayerPaymentStatus('pago');
                setNewPlayerDueDate('');
                setIsGoalkeeper(false);
                setIsPunished(false);
                setNewPlayerPunishmentCount(1);
                setNewPlayerPunishmentFine(0);
                setShowAddPlayerForm(false);
            };

            const updatePlayer = (id, field, value) => {
                let newConfirmedIds = [...confirmedPlayerIds];
                let newFinances = [...finances];
                const updatedPlayers = players.map(p => {
                    if (p.id === id) {
                        let updated = { ...p, [field]: value };
                        
                        // Lógica de confirmação automática baseada no pagamento
                        if (field === 'paymentStatus') {
                            if (value === 'pago') {
                                // Lógica para Mensalista: Adicionar receita ao pagar mensalidade
                                if (p.type === 'mensalista') {
                                    const today = new Date();
                                    today.setHours(0, 0, 0, 0);
                                    const [year, month, day] = (p.dueDate || '').split('-').map(Number);
                                    const currentDueDate = p.dueDate ? new Date(year, month - 1, day) : null;
                                    
                                    if (!currentDueDate || currentDueDate < today) {
                                        const nextMonth = new Date();
                                        nextMonth.setDate(nextMonth.getDate() + 30);
                                        updated.dueDate = nextMonth.toISOString().split('T')[0];
                                    }

                                    // Adicionar entrada financeira para mensalista
                                    newFinances.push({
                                        id: `m-${Date.now()}-${id}`,
                                        description: `Mensalidade: ${p.name}`,
                                        amount: mensalidadeValue,
                                        type: 'income',
                                        date: new Date().toLocaleDateString('pt-BR'),
                                        author: currentUser
                                    });
                                }
                                
                                if (!newConfirmedIds.includes(id) && !p.isPunished) {
                                    newConfirmedIds.push(id);
                                }
                            } else {
                                newConfirmedIds = newConfirmedIds.filter(cid => cid !== id);
                            }
                        }
                        return updated;
                    }
                    return p;
                });
                setPlayers(updatedPlayers);
                setConfirmedPlayerIds(newConfirmedIds);
                setFinances(newFinances);
                saveData(updatedPlayers, newFinances, undefined, matchHistory, undefined, undefined, newConfirmedIds);
            };

            const togglePlayerStatus = (id, field) => {
                const updatedPlayers = players.map(p => {
                    if (p.id === id) {
                        return { ...p, [field]: !p[field] };
                    }
                    return p;
                });
                setPlayers(updatedPlayers);
                saveData(updatedPlayers, finances, undefined, matchHistory);
            };

            const removePlayer = (id) => {
                const updatedPlayers = players.filter(p => p.id !== id);
                setPlayers(updatedPlayers);
                saveData(updatedPlayers, finances, undefined, matchHistory);
            };

            const generateWhatsAppList = (isEmpty = false) => {
                const today = new Date();
                const nextSaturday = new Date();
                // Calcula dias até o próximo sábado. Se hoje for sábado, pega o próximo (daqui a 7 dias)
                let daysUntilSaturday = (6 - today.getDay() + 7) % 7;
                if (daysUntilSaturday === 0) daysUntilSaturday = 7; 
                
                nextSaturday.setDate(today.getDate() + daysUntilSaturday);
                const dateStr = nextSaturday.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                
                const activePlayers = isEmpty 
                    ? players.filter(p => !p.isGoalkeeper && !p.isPunished && (p.type === 'mensalista' || (p.role === 'commission' && isPlayerConfirmed(p))))
                    : players.filter(p => isPlayerConfirmed(p) && !p.isGoalkeeper && !p.isPunished);
                
                const goalkeepers = isEmpty 
                    ? players.filter(p => p.isGoalkeeper && !p.isPunished && (p.role === 'commission' && isPlayerConfirmed(p)))
                    : players.filter(p => isPlayerConfirmed(p) && p.isGoalkeeper && !p.isPunished);
                
                const punished = players.filter(p => p.isPunished);

                const getPlayerNameWithCheck = (p) => {
                    if (!p) return '';
                    const isGuaranteed = (p.type === 'mensalista' || p.role === 'commission') && !p.isGoalkeeper;
                    return `${p.name}${isGuaranteed ? ' ✅' : ''}`;
                };

                let listText = `*⚽💨💨🏃🏻LISTA DO BABA GOSTOSINHO*\n\n`;
                listText += `*${dateStr} - Sábado* ⚽🏆 15:30 da tarde*\n\n`;
                listText += `*CHAVE PIX:*\n\n`;
                listText += `069.237.535-03\n\n`;
                listText += `*Davi da Silva Araújo*\n`;

            const sendTeamsToWhatsApp = () => {

                teams.forEach((team, idx) => {

                text += `🔥 *Bom jogo a todos!*`;

                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');

            const addFinanceEntry = () => {
                const amount = parseFloat(financeAmount);
                if (!financeDesc.trim() || isNaN(amount)) return;
                const entry = {
                    id: Date.now().toString(),
                    description: financeDesc.trim(),
                    amount: amount,
                    type: financeType,
                    date: new Date().toLocaleDateString('pt-BR'),
                    author: currentUser
                };
                const updatedFinances = [...finances, entry];
                setFinances(updatedFinances);
                saveData(players, updatedFinances, undefined, matchHistory);
                setFinanceDesc('');
                setFinanceAmount('');
            };

            const removeFinanceEntry = (id) => {
                const updatedFinances = finances.filter(f => f.id !== id);
                setFinances(updatedFinances);
                saveData(players, updatedFinances, undefined, matchHistory);
            };

            const sendFinanceSummaryToWhatsApp = () => {
                const start = filterStartDate ? new Date(filterStartDate + 'T00:00:00') : null;
                const end = filterEndDate ? new Date(filterEndDate + 'T23:59:59') : null;
                
                const filtered = finances.filter(f => {
                    const [day, month, year] = f.date.split('/').map(Number);
                    const fDate = new Date(year, month - 1, day);
                    
                    if (start && fDate < start) return false;
                    if (end && fDate > end) return false;
                    return true;
                });

                if (filtered.length === 0) {
                    alert('Nenhuma movimentação encontrada no período selecionado!');
                    return;
                }

                let totalIncome = 0;
                let totalExpense = 0;
                
                let text = `📊 *LEVANTAMENTO FINANCEIRO - BABA GOSTOSINHO* 📊\n`;
                if (filterStartDate && filterEndDate) {
                    text += `📅 Período: ${new Date(filterStartDate + 'T00:00:00').toLocaleDateString('pt-BR')} até ${new Date(filterEndDate + 'T00:00:00').toLocaleDateString('pt-BR')}\n`;
                }
                text += `\n`;

                filtered.forEach(f => {
                    const sign = f.type === 'income' ? '🟢' : '🔴';
                    text += `${sign} ${f.date} - ${f.description}: R$ ${f.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}\n`;
                    if (f.type === 'income') totalIncome += f.amount;
                    else totalExpense += f.amount;
                });

                const balance = totalIncome - totalExpense;
                text += `\n--------------------------\n`;
                text += `✅ *Total Receitas:* R$ ${totalIncome.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}\n`;
                text += `❌ *Total Despesas:* R$ ${totalExpense.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}\n`;
                text += `💰 *SALDO FINAL:* R$ ${balance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}\n`;

                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };

            const generateTeams = () => {
                let confirmedPlayers = players.filter(p => isPlayerConfirmed(p) && !p.isPunished);
                let activeGuests = [...guests];

                if (!drawIncludeGoalkeepers) {
                    confirmedPlayers = confirmedPlayers.filter(p => !p.isGoalkeeper);
                    activeGuests = activeGuests.filter(g => !g.isGoalkeeper);
                }

                const activePlayersPool = [...confirmedPlayers, ...activeGuests];
                if (activePlayersPool.length < 2) {
                    alert('Selecione pelo menos 2 jogadores para o sorteio!');
                    return;
                }
                const sorted = activePlayersPool.sort((a, b) => b.level - a.level);
                
                let numTeams = drawNumTeams;
                if (drawMode === 'players') {
                    numTeams = Math.max(2, Math.ceil(sorted.length / drawPlayersPerTeam));
                }

                const newTeams = Array.from({ length: numTeams }, (_, i) => ({
                    id: i + 1,
                    name: `Time ${i + 1}`,
                    players: [],
                    score: 0
                }));
                
                sorted.forEach((p, i) => {
                    let teamIndex;
                    const round = Math.floor(i / numTeams);
                    if (round % 2 === 0) {
                        teamIndex = i % numTeams;
                    } else {
                        teamIndex = (numTeams - 1) - (i % numTeams);
                    }
                    newTeams[teamIndex].players.push(p);
                });

                newTeams.forEach(t => {
                    t.players = t.players.sort(() => Math.random() - 0.5);
                });

                const inDrawIds = activePlayersPool.map(p => p.id);
                setPlayersInDrawIds(inDrawIds);

                setTeams(newTeams);
                const initialQueue = Array.from({ length: numTeams }, (_, i) => i);
                setTeamQueue(initialQueue);
                setCurrentMatchTeams([0, 1]);
                setMatchHistory([]);
                setCurrentLoans([]);
                setLoanedPlayersIdsByTeam({});
                setShowDaySummary(false);
                saveData(players, finances, { teams: newTeams, currentMatchTeams: [0, 1], teamQueue: initialQueue, playersInDrawIds: inDrawIds }, [], false);
                setCurrentTab('teams');
            };

            const deleteDraw = () => {
                setTeams([]);
                setMatchHistory([]);
                setShowDaySummary(false);
                saveData(players, finances, null, [], false);
            };

            const updateScore = (teamIdx, val) => {
                const updatedTeams = [...teams];
                updatedTeams[teamIdx].score = Math.max(0, updatedTeams[teamIdx].score + val);
                setTeams(updatedTeams);
                saveData(players, finances, { teams: updatedTeams, currentMatchTeams }, matchHistory);
            };

            const endMatch = () => {
                const t1Idx = currentMatchTeams[0];
                const t2Idx = currentMatchTeams[1];
                const t1 = teams[t1Idx];
                const t2 = teams[t2Idx];
                if (!t1 || !t2) return;

                const newMatch = {
                    t1: t1.name,
                    s1: t1.score,
                    t2: t2.name,
                    s2: t2.score,
                    time: formatTime(timerSeconds),
                    timestamp: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                };

                const updatedHistory = [...matchHistory, newMatch];
                setMatchHistory(updatedHistory);
                
                // Reset scores for next match
                const updatedTeams = teams.map(t => ({ ...t, score: 0 }));
                setTeams(updatedTeams);
                setTimerSeconds(0);
                setIsTimerRunning(false);

                // Lógica de Partida: Quem ganha fica, quem perde sai
                let newQueue = teamQueue.length > 0 ? [...teamQueue] : Array.from({ length: teams.length }, (_, i) => i);
                let newMatchTeams = [...currentMatchTeams];

                if (t1.score > t2.score) {
                    // Time 1 ganhou, Time 2 sai
                    newQueue = newQueue.filter(idx => idx !== t2Idx);
                    newQueue.push(t2Idx);
                    const nextTeamIdx = newQueue.find(idx => idx !== t1Idx);
                    newMatchTeams = [t1Idx, nextTeamIdx];
                } else if (t2.score > t1.score) {
                    // Time 2 ganhou, Time 1 sai
                    newQueue = newQueue.filter(idx => idx !== t1Idx);
                    newQueue.push(t1Idx);
                    const nextTeamIdx = newQueue.find(idx => idx !== t2Idx);
                    newMatchTeams = [t2Idx, nextTeamIdx];
                } else {
                    // Empate
                    if (teams.length >= 4) {
                        // Saem os dois
                        newQueue = newQueue.filter(idx => idx !== t1Idx && idx !== t2Idx);
                        newQueue.push(t1Idx, t2Idx);
                        newMatchTeams = [newQueue[0], newQueue[1]];
                    } else if (teams.length === 3) {
                        // 3 times, empate: pede para definir novo confronto
                        alert('Empate com 3 times! Defina o próximo confronto manualmente.');
                    }
                }

                setTeamQueue(newQueue);
                setCurrentMatchTeams(newMatchTeams);
                setCurrentLoans([]); // Clear loans when match ends
                saveData(players, finances, { teams: updatedTeams, currentMatchTeams: newMatchTeams, teamQueue: newQueue, currentLoans: [], loanedPlayersIdsByTeam }, updatedHistory);
            };

            const handleAutoSubstitution = (targetTeamIdx) => {
                if (teams.length < 3) {
                    alert('Substituição automática requer pelo menos 3 times.');
                    return;
                }

                // O time que empresta é o último da fila
                const sourceTeamIdx = teamQueue[teamQueue.length - 1];
                const sourceTeam = teams[sourceTeamIdx];
                
                if (!sourceTeam) return;

                // Jogadores do time de origem que ainda não foram emprestados neste ciclo
                const alreadyLoanedIds = loanedPlayersIdsByTeam[sourceTeamIdx] || [];
                let availablePlayers = sourceTeam.players.filter(p => !alreadyLoanedIds.includes(p.id));

                // Se todos já foram emprestados, reinicia o ciclo para este time
                if (availablePlayers.length === 0) {
                    availablePlayers = [...sourceTeam.players];
                    setLoanedPlayersIdsByTeam(prev => ({ ...prev, [sourceTeamIdx]: [] }));
                }

                // Seleciona um jogador (o primeiro disponível)
                const playerToLoan = availablePlayers[0];
                if (!playerToLoan) return;

                // Atualiza empréstimos atuais e histórico de empréstimos
                const newLoans = [...currentLoans, { fromTeamIdx: sourceTeamIdx, toTeamIdx: targetTeamIdx, player: playerToLoan }];
                const newLoanHistory = { ...loanedPlayersIdsByTeam, [sourceTeamIdx]: [...(loanedPlayersIdsByTeam[sourceTeamIdx] || []), playerToLoan.id] };
                
                setCurrentLoans(newLoans);
                setLoanedPlayersIdsByTeam(newLoanHistory);

                saveData(players, finances, undefined, undefined, undefined, undefined, undefined, undefined, undefined, undefined, undefined, newLoans, newLoanHistory);

                alert(`JOGADOR EMPRESTADO: ${playerToLoan.name}\n(Do ${sourceTeam.name} para o ${teams[targetTeamIdx].name})`);
            };

            const endDay = () => {
                if (matchHistory.length === 0) {
                    alert('Nenhuma partida registrada hoje!');
                    return;
                }
                
                // Lançar receitas dos diaristas pagos e convidados
                const newFinances = [...finances];
                const paidDiaristas = players.filter(p => p.type === 'diarista' && p.paymentStatus === 'pago');
                
                // Diaristas
                // Incluir quem pagou OU quem estava no sorteio (mesmo que ausente agora)
                const diaristasToCharge = players.filter(p => 
                    p.type === 'diarista' && 
                    (p.paymentStatus === 'pago' || playersInDrawIds.includes(p.id))
                );
                
                diaristasToCharge.forEach((p, index) => {
                    newFinances.push({
                        id: `d-${Date.now()}-${p.id}-${index}`,
                        description: `Diária: ${p.name}${playersInDrawIds.includes(p.id) && !isPlayerConfirmed(p) ? ' (Ausente)' : ''}`,
                        amount: diariaValue,
                        type: 'income',
                        date: new Date().toLocaleDateString('pt-BR'),
                        author: currentUser
                    });
                });

                // Convidados (apenas os que pagaram)
                guests.filter(g => g.paymentStatus === 'pago').forEach((g, index) => {
                    newFinances.push({
                        id: `g-${Date.now()}-${g.id}-${index}`,
                        description: `Diária (Conv.): ${g.name}`,
                        amount: diariaValue,
                        type: 'income',
                        date: new Date().toLocaleDateString('pt-BR'),
                        author: currentUser
                    });
                });

                // Reset diaristas payment status and update frequency
                const updatedPlayers = players.map(p => {
                    const isConfirmed = isPlayerConfirmed(p);
                    let updated = { 
                        ...p, 
                        totalBabas: (p.totalBabas || 0) + 1,
                        presences: (p.presences || 0) + (isConfirmed ? 1 : 0)
                    };
                    
                    if (p.type === 'diarista') {
                        updated.paymentStatus = 'devendo';
                    }
                    return updated;
                });
                
                setPlayers(updatedPlayers);
                setConfirmedPlayerIds([]); // Limpa confirmados ao encerrar o dia
                setFinances(newFinances);
                setGuests([]); // Limpa convidados ao encerrar o dia

                setShowDaySummary(true);
                saveData(updatedPlayers, newFinances, undefined, undefined, true, [], []);
            };

            const resetDay = () => {
                setMatchHistory([]);
                setTeams([]);
                setGuests([]);
                setPlayersInDrawIds([]);
                setCurrentLoans([]);
                setLoanedPlayersIdsByTeam({});
                setShowDaySummary(false);
                
                const updatedPlayers = players.map(p => {
                    let updated = { ...p };
                    
                    // Decrementar punição
                    if (updated.isPunished && updated.punishmentCount > 0) {
                        updated.punishmentCount -= 1;
                        // Só libera se cumpriu os babas E pagou a multa
                        if (updated.punishmentCount === 0 && (updated.punishmentFinePaid !== false)) {
                            updated.isPunished = false;
                        }
                    } else if (updated.isPunished && updated.punishmentCount <= 0 && (updated.punishmentFinePaid !== false)) {
                        // Caso já tenha cumprido os babas mas pagou a multa agora
                        updated.isPunished = false;
                    }

                    if (updated.type === 'diarista') {
                        updated.paymentStatus = 'devendo';
                    }
                    return updated;
                });
                setPlayers(updatedPlayers);

                const defaultConfirmed = updatedPlayers.filter(p => ((p.type === 'mensalista' && p.paymentStatus === 'pago') || p.role === 'commission') && !p.isPunished).map(p => p.id);
                setConfirmedPlayerIds(defaultConfirmed);
                saveData(updatedPlayers, finances, null, [], false, [], defaultConfirmed);
                setCurrentTab('home');
            };

            const shareDaySummary = () => {
                const stats = calculateStats();
                const sortedStats = Object.entries(stats).sort((a, b) => {
                    if (b[1].v !== a[1].v) return b[1].v - a[1].v;
                    return b[1].gp - a[1].gp;
                });

                let winnerText = "";
                if (sortedStats.length > 0) {
                    const topV = sortedStats[0][1].v;
                    const winners = sortedStats.filter(s => s[1].v === topV);
                    if (winners.length > 1) winnerText = `🏆 *Empate técnico:* ${winners.map(w => w[0]).join(' e ')}`;
                    else winnerText = `🏆 *Campeão:* ${winners[0][0]}`;
                }

                let text = `⚽ *RESUMO DO BABA GOSTOSINHO* ⚽\n\n${winnerText}\n\n`;
                
                text += `📊 *CLASSIFICAÇÃO:*\n`;
                sortedStats.forEach(([name, s]) => {
                    text += `${name}: ${s.v}V | ${s.e}E | ${s.d}D | ${s.gp} Gols\n`;
                });

                text += `\n👥 *ELENCOS:*\n`;
                teams.forEach(t => {
                    text += `*${t.name}:* ${t.players.map(p => p.name).join(', ')}\n`;
                });

                text += `\n🔥 *Parabéns a todos!*`;

                if (navigator.share) {
                    navigator.share({ text });
                } else {
                    const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
                    window.open(url, '_blank');
                }
            };

            const calculateStats = () => {
                const stats = {};
                teams.forEach(t => {
                    stats[t.name] = { v: 0, e: 0, d: 0, gp: 0 };
                });

                matchHistory.forEach(m => {
                    if (!stats[m.t1]) stats[m.t1] = { v: 0, e: 0, d: 0, gp: 0 };
                    if (!stats[m.t2]) stats[m.t2] = { v: 0, e: 0, d: 0, gp: 0 };

                    stats[m.t1].gp += m.s1;
                    stats[m.t2].gp += m.s2;

                    if (m.s1 > m.s2) {
                        stats[m.t1].v += 1;
                        stats[m.t2].d += 1;
                    } else if (m.s2 > m.s1) {
                        stats[m.t2].v += 1;
                        stats[m.t1].d += 1;
                    } else {
                        stats[m.t1].e += 1;
                        stats[m.t2].e += 1;
                    }
                });
                return stats;
            };

            const shareMatch = () => {
                const t1 = teams[currentMatchTeams[0]];
                const t2 = teams[currentMatchTeams[1]];
                if (!t1 || !t2) return;

                const text = `⚽ *Baba gostosinho - Resumo da Partida* ⚽\n\n` +
                    `Placar: ${t1.name} ${t1.score} x ${t2.score} ${t2.name}\n` +
                    `Tempo: ${formatTime(timerSeconds)}\n\n` +
                    `*${t1.name}:* ${t1.players.map(p => p.name).join(', ')}\n` +
                    `*${t2.name}:* ${t2.players.map(p => p.name).join(', ')}\n\n` +
                    `Organizado via Baba gostosinho!`;

                if (navigator.share) {
                    navigator.share({ text });
                } else {
                    navigator.clipboard.writeText(text);
                    alert('Resumo copiado para a área de transferência!');
                }
            };

            const totalBalance = finances.reduce((acc, f) => {
                return f.type === 'income' ? acc + f.amount : acc - f.amount;
            }, 0);

            const getAuthorTag = (author) => {
                if (author === 'Dan2620') return <span className="ml-2 px-1.5 py-0.5 bg-black text-white text-[8px] font-black rounded uppercase">Dan</span>;
                if (author === 'Davi2168') return <span className="ml-2 px-1.5 py-0.5 bg-red-600 text-white text-[8px] font-black rounded uppercase">Davi</span>;
                return null;

                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600"></div>

            return (
                <div className="bg-zinc-50 text-zinc-900 min-h-screen pb-24">
                    {/* Header */}
                    {(currentTab !== 'home' || isAdminMode) && (
                        <header className="bg-white border-b border-zinc-200 sticky top-0 z-10">
                            <div className="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
                                <button 
                                    onClick={() => {
                                        if (isAdminMode && currentTab === 'home') setIsAdminMode(false);
                                        else if (isViewMode) {
                                            setIsViewMode(false);
                                            setCurrentTab('home');
                                        }
                                        else setCurrentTab('home');
                                    }} 
                                    className="p-2 hover:bg-zinc-100 rounded-full transition-colors text-zinc-600"
                                >

                                </button>
                                <button onClick={shareMatch} className="p-2 hover:bg-zinc-100 rounded-full transition-colors text-zinc-600">
                                    <Icon name="share-2" size={20} />
                                </button>
                            </div>
                        </header>
                    )}

                    <main className="max-w-md mx-auto px-4 py-6">
                        {/* Home Tab */}
                        {currentTab === 'home' && (
                            <div className="space-y-6">
                                {!isAdminMode && !isViewMode ? (
                                    <div className="fixed inset-0 flex flex-col items-center justify-end px-8 pb-20 bg-cover bg-center" style={{ backgroundImage: "url('https://image2url.com/r2/default/images/1773069462364-21238cdb-2ba8-4949-b313-b74d3a6466ec.png')" }}>
                                        <div className="flex gap-4 w-full max-w-md">
                                            <button 
                                                onClick={() => setShowPasswordModal(true)} 
                                                className="flex-1 bg-emerald-600/80 backdrop-blur-md hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-[0_6px_0_rgb(5,120,85)] transition-all active:shadow-none active:translate-y-[6px] flex flex-col items-center justify-center gap-2 border border-white/20"
                                            >
                                                <Icon name="shield-check" size={24} />
                                                <span className="text-xs tracking-widest">COMISSÃO</span>
                                            </button>
                                            <button 
                                                onClick={() => {
                                                    setIsViewMode(true);
                                                    setCurrentTab('teams');
                                                }} 
                                                className="flex-1 bg-yellow-400/80 backdrop-blur-md hover:bg-yellow-400 text-yellow-950 font-bold py-4 rounded-2xl shadow-[0_6px_0_rgb(202,138,4)] transition-all active:shadow-none active:translate-y-[6px] flex flex-col items-center justify-center gap-2 border border-yellow-300/30"
                                            >
                                                <Icon name="users" size={24} />
                                                <span className="text-xs tracking-widest">JOGADOR</span>

                                        </div>
                                    </div>
                                ) : isAdminMode ? (

                                                >

                                                </button>

                                        {adminSubTab === 'finance' && (

                                                     <p className="text-xs font-bold uppercase tracking-widest opacity-80">Saldo Total</p>
                                                     <p className="text-4xl font-black">R$ {totalBalance.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                                 </div>

                                                 {/* Configuração de Valores */}
                                                 <section className="bg-white p-5 rounded-2xl shadow-sm border border-zinc-200">
                                                     <h3 className="text-sm font-semibold uppercase tracking-wider text-zinc-500 mb-4 flex items-center gap-2">

                                                         Configuração de Valores
