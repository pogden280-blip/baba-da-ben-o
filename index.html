                                                <select 
                                                    value={editingPlayer.type}
                                                    onChange={(e) => setEditingPlayer({...editingPlayer, type: e.target.value})}
                                                    className="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:outline-none text-xs font-bold"
                                                >
                                                    <option value="mensalista">Mensalista</option>
                                                    <option value="diarista">Diarista</option>
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-zinc-400 uppercase">Posição</label>
                                                <button 
                                                    onClick={() => setEditingPlayer({...editingPlayer, isGoalkeeper: !editingPlayer.isGoalkeeper})}
                                                    className={`w-full py-3 rounded-xl border font-bold text-xs transition-all ${editingPlayer.isGoalkeeper ? 'bg-amber-100 border-amber-500 text-amber-600' : 'bg-zinc-100 border-zinc-200 text-zinc-500'}`}
                                                >
                                                    {editingPlayer.isGoalkeeper ? 'GOLEIRO' : 'LINHA'}
                                                </button>
                                            </div>
                                        </div>

                                        {editingPlayer.type === 'mensalista' && (
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-zinc-400 uppercase">Vencimento</label>
                                                <input 
                                                    type="date" 
                                                    value={editingPlayer.dueDate || ''} 
                                                    onChange={(e) => setEditingPlayer({...editingPlayer, dueDate: e.target.value})}
                                                    className="w-full px-4 py-3 rounded-xl border border-zinc-200 focus:outline-none text-xs font-bold" 
                                                />
                                            </div>
                                        )}

                                        <div className="pt-2 border-t border-zinc-100">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-2">
                                                    <Icon name="alert-triangle" size={16} className={editingPlayer.isPunished ? "text-red-500" : "text-zinc-300"} />
                                                    <span className="text-xs font-bold text-zinc-600">Punição Ativa</span>
                                                </div>
                                                <button 
                                                    onClick={() => setEditingPlayer({...editingPlayer, isPunished: !editingPlayer.isPunished, punishmentCount: !editingPlayer.isPunished ? (editingPlayer.punishmentCount || 1) : 0})}
                                                    className={`w-12 h-6 rounded-full transition-all relative ${editingPlayer.isPunished ? 'bg-red-500' : 'bg-zinc-200'}`}
                                                >
                                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${editingPlayer.isPunished ? 'left-7' : 'left-1'}`} />
                                                </button>
                                            </div>
                                            {editingPlayer.isPunished && (
                                                <div className="mt-3 flex items-center justify-between bg-red-50 p-3 rounded-xl border border-red-100">
                                                    <span className="text-[10px] font-bold text-red-600 uppercase">Qtd. de Babas</span>
                                                    <div className="flex items-center gap-3">
                                                        <button 
                                                            onClick={() => setEditingPlayer({...editingPlayer, punishmentCount: Math.max(1, editingPlayer.punishmentCount - 1)})}
                                                            className="w-8 h-8 rounded-lg bg-white border border-red-200 flex items-center justify-center text-red-600"
                                                        >
                                                            -
                                                        </button>
                                                        <span className="font-bold text-red-600">{editingPlayer.punishmentCount}</span>
                                                        <button 
                                                            onClick={() => setEditingPlayer({...editingPlayer, punishmentCount: editingPlayer.punishmentCount + 1})}
                                                            className="w-8 h-8 rounded-lg bg-white border border-red-200 flex items-center justify-center text-red-600"
                                                        >
                                                            +
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex gap-3 pt-2">
                                        <button 
                                            onClick={() => setShowEditPlayerModal(false)} 
                                            className="flex-1 bg-zinc-100 text-zinc-600 font-bold py-4 rounded-2xl"
                                        >
                                            Cancelar
                                        </button>
                                        <button 
                                            onClick={updatePlayerFull} 
                                            className="flex-2 bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-600/20"
                                        >
                                            Salvar Alterações
                                        </button>
                                    </div>
                                </div>
                            </motion.div>
                        </div>
                    )}

                    {/* Modal de Cargo de Comissão e Ausência */}
                    {showRoleModal && selectedPlayerForRole && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <motion.div 
                                initial={{ scale: 0.9, opacity: 0 }}
                                animate={{ scale: 1, opacity: 1 }}
                                className="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl"
                            >
                                <div className="p-6">
                                    <h3 className="text-xl font-bold text-zinc-800 mb-2">{selectedPlayerForRole.name}</h3>
                                    
                                    {roleActionStep === 'choice' && (
                                        <div className="space-y-3 mt-4">
                                            <button 
                                                onClick={() => {
                                                    if (isAdminMode) {
                                                        if (selectedPlayerForRole.role === 'commission') {
                                                            removeCommissionRole();
                                                        } else {
                                                            setRoleActionStep('config');
                                                        }
                                                    } else {
                                                        setRoleActionStep('password');
                                                    }
                                                }}
                                                className="w-full py-4 rounded-2xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2"
                                            >
                                                <Icon name="shield" size={18} />
                                                {selectedPlayerForRole.role === 'commission' ? 'Remover Cargo' : 'Definir como Comissão'}
                                            </button>

                                            <div className="grid grid-cols-2 gap-3">
                                                <button 
                                                    onClick={() => {
                                                        setEditingPlayer({...selectedPlayerForRole});
                                                        setShowEditPlayerModal(true);
                                                        setShowRoleModal(false);
                                                    }}
                                                    className="py-4 rounded-2xl font-bold text-emerald-600 bg-emerald-50 hover:bg-emerald-100 transition-colors flex items-center justify-center gap-2 border border-emerald-100"
                                                >
                                                    <Icon name="edit" size={18} />
                                                    Editar
                                                </button>

                                                <button 
                                                    onClick={() => {
                                                        if (confirm(`Deseja realmente excluir ${selectedPlayerForRole.name}?`)) {
                                                            removePlayer(selectedPlayerForRole.id);
                                                            setShowRoleModal(false);
                                                        }
                                                    }}
                                                    className="py-4 rounded-2xl font-bold text-red-600 bg-red-50 hover:bg-red-100 transition-colors flex items-center justify-center gap-2 border border-red-100"
                                                >
                                                    <Icon name="trash-2" size={18} />
                                                    Excluir
                                                </button>
                                            </div>

                                            <button 
                                                onClick={() => {
                                                    togglePlayerStatus(selectedPlayerForRole.id, 'isGoalkeeper');
                                                    setShowRoleModal(false);
                                                }}
                                                className={`w-full py-4 rounded-2xl font-bold transition-colors flex items-center justify-center gap-2 ${selectedPlayerForRole.isGoalkeeper ? 'bg-amber-100 text-amber-600 hover:bg-amber-200' : 'bg-zinc-100 text-zinc-600 hover:bg-zinc-200'}`}
                                            >
                                                <Icon name="shield" size={18} />
                                                {selectedPlayerForRole.isGoalkeeper ? 'Remover Goleiro' : 'Definir como Goleiro'}
                                            </button>

                                            {selectedPlayerForRole.role === 'commission' && (
                                                <button 
                                                    onClick={() => toggleCommissionAbsence(selectedPlayerForRole)}
                                                    className={`w-full py-4 rounded-2xl font-bold transition-colors flex items-center justify-center gap-2 ${isPlayerConfirmed(selectedPlayerForRole) ? 'bg-red-100 text-red-600 hover:bg-red-200' : 'bg-emerald-100 text-emerald-600 hover:bg-emerald-200'}`}
                                                >
                                                    <Icon name={isPlayerConfirmed(selectedPlayerForRole) ? "user-x" : "user-check"} size={18} />
                                                    {isPlayerConfirmed(selectedPlayerForRole) ? 'Declarar Ausência' : 'Confirmar Presença'}
                                                </button>
                                            )}

                                            <button 
                                                onClick={() => {
                                                    const p = selectedPlayerForRole;
                                                    if (!p.isPunished) {
                                                        const count = prompt('Quantos babas de punição?', '1');
                                                        if (count === null) return;
                                                        const fine = prompt('Valor da multa (R$)?', '0');
                                                        if (fine === null) return;

                                                        const countNum = parseInt(count) || 1;
                                                        const fineNum = parseFloat(fine) || 0;

                                                        const updatedPlayers = players.map(player => 
                                                            player.id === p.id ? { 
                                                                ...player, 
                                                                isPunished: true, 
                                                                punishmentCount: countNum,
                                                                punishmentFine: fineNum,
                                                                punishmentFinePaid: fineNum > 0 ? false : true
                                                            } : player
                                                        );
                                                        const newConfirmed = confirmedPlayerIds.filter(id => id !== p.id);
                                                        setPlayers(updatedPlayers);
                                                        setConfirmedPlayerIds(newConfirmed);
                                                        saveData(updatedPlayers, finances, undefined, matchHistory, undefined, undefined, newConfirmed);
                                                    } else {
                                                        const updatedPlayers = players.map(player => 
                                                            player.id === p.id ? { ...player, isPunished: false, punishmentCount: 0, punishmentFine: 0, punishmentFinePaid: true } : player
                                                        );
                                                        
                                                        let newConfirmed = [...confirmedPlayerIds];
                                                        if (((p.type === 'mensalista' && p.paymentStatus === 'pago') || p.role === 'commission') && !newConfirmed.includes(p.id)) {
                                                            newConfirmed.push(p.id);
                                                        }
                                                        
                                                        setPlayers(updatedPlayers);
                                                        setConfirmedPlayerIds(newConfirmed);
                                                        saveData(updatedPlayers, finances, undefined, matchHistory, undefined, undefined, newConfirmed);
                                                    }
                                                    setShowRoleModal(false);
                                                }}
                                                className={`w-full py-4 rounded-2xl font-bold transition-colors flex items-center justify-center gap-2 ${selectedPlayerForRole.isPunished ? 'bg-emerald-100 text-emerald-600 hover:bg-emerald-200' : 'bg-red-100 text-red-600 hover:bg-red-200'}`}
                                            >
                                                <Icon name={selectedPlayerForRole.isPunished ? "unlock" : "alert-circle"} size={18} />
                                                {selectedPlayerForRole.isPunished ? 'Liberar Jogador' : 'Punir Jogador'}
                                            </button>
                                            
                                            <button 
                                                onClick={() => {
                                                    setShowRoleModal(false);
                                                    setSelectedPlayerForRole(null);
                                                    setRoleActionStep('choice');
                                                    setAdminPasswordInput('');
                                                    setNewRolePassword('');
                                                }}
                                                className="w-full py-3 rounded-xl font-bold text-zinc-400 hover:text-zinc-600 transition-colors"
                                            >
                                                Cancelar
                                            </button>
                                        </div>
                                    )}

                                    {roleActionStep === 'password' && (
                                        <div className="space-y-4 mt-4">
                                            <p className="text-sm text-zinc-500">Ação restrita. Digite a senha da Comissão para prosseguir.</p>
                                            <input 
                                                type="password"
                                                value={adminPasswordInput}
                                                onChange={(e) => setAdminPasswordInput(e.target.value)}
                                                placeholder="Senha da Comissão"
                                                className="w-full bg-zinc-50 border border-zinc-200 rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-center"
                                                onKeyDown={(e) => e.key === 'Enter' && handleRoleAction()}
                                            />
                                            <div className="flex gap-3">
                                                <button onClick={() => {
                                                    setRoleActionStep('choice');
                                                    setAdminPasswordInput('');
                                                }} className="flex-1 py-3 font-bold text-zinc-400">Voltar</button>
                                                <button onClick={handleRoleAction} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">Confirmar</button>
                                            </div>
                                        </div>
                                    )}

                                    {roleActionStep === 'config' && (
                                        <div className="space-y-4 mt-4">
                                            <p className="text-sm text-zinc-500">Defina uma senha de acesso para {selectedPlayerForRole.name}.</p>
                                            <input 
                                                type="password"
                                                value={newRolePassword}
                                                onChange={(e) => setNewRolePassword(e.target.value)}
                                                placeholder="Nova senha do membro"
                                                className="w-full bg-zinc-50 border border-zinc-200 rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all"
                                            />
                                            <div className="flex gap-3">
                                                <button onClick={() => {
                                                    setRoleActionStep('choice');
                                                    setNewRolePassword('');
                                                }} className="flex-1 py-3 font-bold text-zinc-400">Cancelar</button>
                                                <button onClick={assignCommissionRole} className="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold">Salvar</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </motion.div>
                        </div>
                    )}

                    {/* Password Modal */}
                    {showPasswordModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-xs rounded-3xl p-8 shadow-2xl space-y-6">
                                <div className="text-center space-y-2">
                                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto">
                                        <Icon name="lock" size={32} />
                                    </div>
                                    <h3 className="text-xl font-black">Acesso Restrito</h3>
                                    <p className="text-sm text-zinc-500">Digite a senha da Comissão</p>
                                </div>
                                <div className="space-y-4">
                                    <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdminAuth()} placeholder="••••••••" className="w-full px-4 py-4 rounded-2xl border-2 text-center text-2xl tracking-widest font-mono" />
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowPasswordModal(false)} className="flex-1 py-4 font-bold text-zinc-400">Cancelar</button>
                                        <button onClick={handleAdminAuth} className="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-bold">Entrar</button>
                                    </div>
                                </div>

                                {accessHistory.length > 0 && (
                                    <div className="pt-4 border-t border-zinc-100">
                                        <p className="text-[10px] font-bold text-zinc-400 uppercase mb-2 text-center">Últimos Acessos</p>
                                        <div className="space-y-2">
                                            {accessHistory.map((access, idx) => (
                                                <div key={idx} className="flex justify-between items-center text-[10px] text-zinc-500 bg-zinc-50 px-3 py-2 rounded-lg">
                                                    <span className="font-bold text-zinc-700">{access.user}</span>
                                                    <span>{access.time}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
